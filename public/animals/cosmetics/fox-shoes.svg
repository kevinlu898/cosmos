<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="shoes for Freddy the fox">
  <style>
    .bob   { animation: a-bob 3.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .footL { animation: a-step 1.1s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .footR { animation: a-step 1.1s ease-in-out infinite .55s; transform-box: fill-box; transform-origin: center bottom; }
    @keyframes a-bob  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    @keyframes a-step { 0%,100% { transform: translateY(0); } 30% { transform: translateY(-6px) rotate(-4deg); } }
    @media (prefers-reduced-motion: reduce) { .bob,.footL,.footR { animation: none !important; } }
  </style>
  <g class="footL" style="transform-box:fill-box;transform-origin:center bottom"><path d="M75 180 Q75 169 86 169 Q97 169 97 180 Z" fill="#f4b400" /><rect x="74" y="179" width="24" height="6" rx="3" fill="#ffffff"/><path d="M82 174 L90 174" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none"/><path d="M86 171 L86 177" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none"/></g><g class="footR" style="transform-box:fill-box;transform-origin:center bottom"><path d="M103 180 Q103 169 114 169 Q125 169 125 180 Z" fill="#f4b400" /><rect x="102" y="179" width="24" height="6" rx="3" fill="#ffffff"/><path d="M110 174 L118 174" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none"/><path d="M114 171 L114 177" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none"/></g>
</svg>
