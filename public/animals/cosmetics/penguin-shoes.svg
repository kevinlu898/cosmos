<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="shoes for Penny the penguin">
  <style>
    .bob   { animation: a-bob 3.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .footL { animation: a-step 1.1s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .footR { animation: a-step 1.1s ease-in-out infinite .55s; transform-box: fill-box; transform-origin: center bottom; }
    @keyframes a-bob  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    @keyframes a-step { 0%,100% { transform: translateY(0); } 30% { transform: translateY(-6px) rotate(-4deg); } }
    @media (prefers-reduced-motion: reduce) { .bob,.footL,.footR { animation: none !important; } }
  </style>
  <g class="footL" style="transform-box:fill-box;transform-origin:center bottom"><path d="M77 185 Q77 174 88 174 Q99 174 99 185 Z" fill="#f4b400" /><rect x="76" y="184" width="24" height="6" rx="3" fill="#ffffff"/><path d="M84 179 L92 179" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none"/><path d="M88 176 L88 182" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none"/></g><g class="footR" style="transform-box:fill-box;transform-origin:center bottom"><path d="M101 185 Q101 174 112 174 Q123 174 123 185 Z" fill="#f4b400" /><rect x="100" y="184" width="24" height="6" rx="3" fill="#ffffff"/><path d="M108 179 L116 179" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none"/><path d="M112 176 L112 182" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none"/></g>
</svg>
