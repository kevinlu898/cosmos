<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="scarf for Benny the bear">
  <style>
    .bob   { animation: a-bob 3.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .footL { animation: a-step 1.1s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .footR { animation: a-step 1.1s ease-in-out infinite .55s; transform-box: fill-box; transform-origin: center bottom; }
    @keyframes a-bob  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    @keyframes a-step { 0%,100% { transform: translateY(0); } 30% { transform: translateY(-6px) rotate(-4deg); } }
    @media (prefers-reduced-motion: reduce) { .bob,.footL,.footR { animation: none !important; } }
  </style>
  <g class="bob"><ellipse cx="100" cy="113" rx="28" ry="8.5" fill="#2bb3a3" /><ellipse cx="100" cy="111" rx="25" ry="3.4" fill="#bfe9e2" opacity="0.55"/><path d="M100.84 115 q-1 13 -3 23 q5 4 11 1 q1 -12 1 -23 Z" fill="#2bb3a3" /><path d="M104.84 121 L103.84 135" stroke="#bfe9e2" stroke-width="2" stroke-linecap="round" fill="none"/><circle cx="107.84" cy="114" r="7" fill="#1f8d80" /><path d="M101.84 138 L101.84 143" stroke="#2bb3a3" stroke-width="2" stroke-linecap="round" fill="none"/><path d="M106.84 139 L106.84 144" stroke="#2bb3a3" stroke-width="2" stroke-linecap="round" fill="none"/><path d="M111.84 138 L111.84 143" stroke="#2bb3a3" stroke-width="2" stroke-linecap="round" fill="none"/></g>
</svg>
