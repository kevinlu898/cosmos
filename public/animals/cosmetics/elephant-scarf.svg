<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="scarf for Ellie the elephant">
  <style>
    .bob   { animation: a-bob 3.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .footL { animation: a-step 1.1s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .footR { animation: a-step 1.1s ease-in-out infinite .55s; transform-box: fill-box; transform-origin: center bottom; }
    @keyframes a-bob  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    @keyframes a-step { 0%,100% { transform: translateY(0); } 30% { transform: translateY(-6px) rotate(-4deg); } }
    @media (prefers-reduced-motion: reduce) { .bob,.footL,.footR { animation: none !important; } }
  </style>
  <g class="bob"><ellipse cx="100" cy="108" rx="27" ry="8.5" fill="#2bb3a3" /><ellipse cx="100" cy="106" rx="24" ry="3.4" fill="#bfe9e2" opacity="0.55"/><path d="M100.56 110 q-1 13 -3 23 q5 4 11 1 q1 -12 1 -23 Z" fill="#2bb3a3" /><path d="M104.56 116 L103.56 130" stroke="#bfe9e2" stroke-width="2" stroke-linecap="round" fill="none"/><circle cx="107.56" cy="109" r="7" fill="#1f8d80" /><path d="M101.56 133 L101.56 138" stroke="#2bb3a3" stroke-width="2" stroke-linecap="round" fill="none"/><path d="M106.56 134 L106.56 139" stroke="#2bb3a3" stroke-width="2" stroke-linecap="round" fill="none"/><path d="M111.56 133 L111.56 138" stroke="#2bb3a3" stroke-width="2" stroke-linecap="round" fill="none"/></g>
</svg>
