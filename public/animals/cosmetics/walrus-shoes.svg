<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="shoes for Willie the walrus">
  <style>
    .bob   { animation: a-bob 3.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .footL { animation: a-step 1.1s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .footR { animation: a-step 1.1s ease-in-out infinite .55s; transform-box: fill-box; transform-origin: center bottom; }
    @keyframes a-bob  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    @keyframes a-step { 0%,100% { transform: translateY(0); } 30% { transform: translateY(-6px) rotate(-4deg); } }
    @media (prefers-reduced-motion: reduce) { .bob,.footL,.footR { animation: none !important; } }
  </style>
  <g class="footL" style="transform-box:fill-box;transform-origin:center bottom"><path d="M64 171 Q64 160 78 160 Q92 160 92 171 Z" fill="#f4b400" /><rect x="63" y="170" width="30" height="6" rx="3" fill="#ffffff"/><path d="M74 165 L82 165" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none"/><path d="M78 162 L78 168" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none"/></g><g class="footR" style="transform-box:fill-box;transform-origin:center bottom"><path d="M108 171 Q108 160 122 160 Q136 160 136 171 Z" fill="#f4b400" /><rect x="107" y="170" width="30" height="6" rx="3" fill="#ffffff"/><path d="M118 165 L126 165" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none"/><path d="M122 162 L122 168" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none"/></g>
</svg>
