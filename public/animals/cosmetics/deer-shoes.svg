<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="shoes for Daisy the deer">
  <style>
    .bob   { animation: a-bob 3.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .footL { animation: a-step 1.1s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .footR { animation: a-step 1.1s ease-in-out infinite .55s; transform-box: fill-box; transform-origin: center bottom; }
    @keyframes a-bob  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    @keyframes a-step { 0%,100% { transform: translateY(0); } 30% { transform: translateY(-6px) rotate(-4deg); } }
    @media (prefers-reduced-motion: reduce) { .bob,.footL,.footR { animation: none !important; } }
  </style>
  <g class="footL" style="transform-box:fill-box;transform-origin:center bottom"><path d="M71 179 Q71 168 82 168 Q93 168 93 179 Z" fill="#f4b400" /><rect x="70" y="178" width="24" height="6" rx="3" fill="#ffffff"/><path d="M78 173 L86 173" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none"/><path d="M82 170 L82 176" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none"/></g><g class="footR" style="transform-box:fill-box;transform-origin:center bottom"><path d="M107 179 Q107 168 118 168 Q129 168 129 179 Z" fill="#f4b400" /><rect x="106" y="178" width="24" height="6" rx="3" fill="#ffffff"/><path d="M114 173 L122 173" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none"/><path d="M118 170 L118 176" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none"/></g>
</svg>
