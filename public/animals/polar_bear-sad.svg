<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Peter the polar bear looking sad">
  <style>
    .bob   { animation: a-bob 3.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .eye   { animation: a-blink 4.6s infinite; transform-box: fill-box; transform-origin: center; }
    .tail  { animation: a-wag 1.5s ease-in-out infinite; }
    .footL { animation: a-step 1.1s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .footR { animation: a-step 1.1s ease-in-out infinite .55s; transform-box: fill-box; transform-origin: center bottom; }
    .ear   { animation: a-ear 3.6s ease-in-out infinite; }
    .spark { animation: a-twinkle 1.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .tear  { animation: a-drop 2.8s ease-in infinite; transform-box: fill-box; transform-origin: center; }

    @keyframes a-bob  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    @keyframes a-blink{ 0%,93%,100% { transform: scaleY(1); } 96.5% { transform: scaleY(0.08); } }
    @keyframes a-wag  { 0%,100% { transform: rotate(-11deg); } 50% { transform: rotate(11deg); } }
    @keyframes a-step { 0%,100% { transform: translateY(0); } 30% { transform: translateY(-6px) rotate(-4deg); } }
    @keyframes a-ear  { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-5deg); } }
    @keyframes a-twinkle { 0%,100% { opacity: .25; transform: scale(.6); } 50% { opacity: 1; transform: scale(1.1); } }
    @keyframes a-drop { 0% { transform: translateY(0); opacity: 0; } 15% { opacity: 1; } 100% { transform: translateY(16px); opacity: 0; } }

    @media (prefers-reduced-motion: reduce) {
      .bob,.eye,.tail,.footL,.footR,.ear,.spark,.tear { animation: none !important; }
    }
  </style>
  <ellipse cx="100" cy="188" rx="56" ry="9" fill="#000" opacity="0.12"/>
  
    <g class="tail" style="transform-box:view-box;transform-origin:132px 158px"><circle cx="134" cy="158" r="8" fill="#f4f7fb" /><circle cx="134" cy="158" r="8" fill="#dde7f0" opacity="0.5"/></g>
    <g class="footL"><ellipse cx="84" cy="176" rx="12" ry="13" fill="#f4f7fb" /><ellipse cx="84" cy="182" rx="8" ry="5" fill="#dde7f0" /></g>
    <g class="footR"><ellipse cx="116" cy="176" rx="12" ry="13" fill="#f4f7fb" /><ellipse cx="116" cy="182" rx="8" ry="5" fill="#dde7f0" /></g>
    <g class="bob">
      <ellipse cx="100" cy="142" rx="40" ry="38" fill="#f4f7fb" />
      <ellipse cx="100" cy="150" rx="26" ry="24" fill="#dde7f0" opacity="0.5"/>
      <ellipse cx="100" cy="78" rx="33" ry="31" fill="#f4f7fb" />
      <g class="ear" style="transform-box:view-box;transform-origin:76px 56px"><circle cx="76" cy="56" r="11" fill="#f4f7fb" /><circle cx="76" cy="56" r="5" fill="#dde7f0" /></g>
      <g class="ear" style="transform-box:view-box;transform-origin:124px 56px;animation-delay:.6s"><circle cx="124" cy="56" r="11" fill="#f4f7fb" /><circle cx="124" cy="56" r="5" fill="#dde7f0" /></g>
      <ellipse cx="100" cy="90" rx="17" ry="14" fill="#dde7f0" opacity="0.6"/>
      <ellipse cx="100" cy="84" rx="6" ry="4.5" fill="#2b2b2b" />
      <g class="eye"><circle cx="88" cy="75" r="6.65" fill="#3a2a1e" /><circle cx="86.67" cy="77" r="2.26" fill="#fff" /></g><g class="eye"><circle cx="112" cy="75" r="6.65" fill="#3a2a1e" /><circle cx="110.67" cy="77" r="2.26" fill="#fff" /></g><path d="M80 70 L92.9 65" stroke="#3a2a1e" stroke-width="3" stroke-linecap="round" fill="none" /><path d="M120 70 L107.1 65" stroke="#3a2a1e" stroke-width="3" stroke-linecap="round" fill="none" /><path d="M92.3 100 Q100 91 107.7 100" stroke="#3a2a1e" stroke-width="3" fill="none" stroke-linecap="round"/><g class="tear"><path d="M116 81 q-4 6 0 9 q4 -3 0 -9 Z" fill="#7ec8f2" /></g>
    </g>
</svg>
