<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Willie the walrus looking excited">
  <style>
    .bob   { animation: a-bob 3.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .eye   { animation: a-blink 4.6s infinite; transform-box: fill-box; transform-origin: center; }
    .tail  { animation: a-wag 1.5s ease-in-out infinite; }
    .footL { animation: a-step 1.1s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .footR { animation: a-step 1.1s ease-in-out infinite .55s; transform-box: fill-box; transform-origin: center bottom; }
    .ear   { animation: a-ear 3.6s ease-in-out infinite; }
    .spark { animation: a-twinkle 1.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .tear  { animation: a-drop 2.8s ease-in infinite; transform-box: fill-box; transform-origin: center; }

    @keyframes a-bob  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    @keyframes a-blink{ 0%,93%,100% { transform: scaleY(1); } 96.5% { transform: scaleY(0.08); } }
    @keyframes a-wag  { 0%,100% { transform: rotate(-11deg); } 50% { transform: rotate(11deg); } }
    @keyframes a-step { 0%,100% { transform: translateY(0); } 30% { transform: translateY(-6px) rotate(-4deg); } }
    @keyframes a-ear  { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-5deg); } }
    @keyframes a-twinkle { 0%,100% { opacity: .25; transform: scale(.6); } 50% { opacity: 1; transform: scale(1.1); } }
    @keyframes a-drop { 0% { transform: translateY(0); opacity: 0; } 15% { opacity: 1; } 100% { transform: translateY(16px); opacity: 0; } }

    @media (prefers-reduced-motion: reduce) {
      .bob,.eye,.tail,.footL,.footR,.ear,.spark,.tear { animation: none !important; }
    }
  </style>
  <ellipse cx="100" cy="188" rx="56" ry="9" fill="#000" opacity="0.12"/>
  
    <g class="tail" style="transform-box:view-box;transform-origin:96px 184px"><path d="M84 182 Q100 196 116 182 Q100 190 84 182 Z" fill="#9c785a" /></g>
    <g class="footL"><ellipse cx="78" cy="168" rx="14" ry="9" fill="#9c785a" /></g>
    <g class="footR"><ellipse cx="122" cy="168" rx="14" ry="9" fill="#9c785a" /></g>
    <g class="bob">
      <ellipse cx="100" cy="132" rx="44" ry="46" fill="#b08968" />
      <ellipse cx="100" cy="144" rx="28" ry="32" fill="#d8b894" />
      <ellipse cx="100" cy="80" rx="32" ry="30" fill="#b08968" />
      <!-- big whiskery snout -->
      <ellipse cx="100" cy="96" rx="22" ry="16" fill="#d8b894" />
      <ellipse cx="91" cy="92" rx="4" ry="3" fill="#3a2a1e" /><ellipse cx="109" cy="92" rx="4" ry="3" fill="#3a2a1e" />
      <!-- tusks -->
      <path d="M93 104 q-2 16 -5 20 q-4 -1 -3 -6 q1 -10 3 -15 Z" fill="#fff6e0" />
      <path d="M107 104 q2 16 5 20 q4 -1 3 -6 q-1 -10 -3 -15 Z" fill="#fff6e0" />
      <!-- whiskers -->
      <path d="M86 100 L70 98" stroke="#7a5e44" stroke-width="1.5" stroke-linecap="round" fill="none" /><path d="M86 104 L70 106" stroke="#7a5e44" stroke-width="1.5" stroke-linecap="round" fill="none" />
      <path d="M114 100 L130 98" stroke="#7a5e44" stroke-width="1.5" stroke-linecap="round" fill="none" /><path d="M114 104 L130 106" stroke="#7a5e44" stroke-width="1.5" stroke-linecap="round" fill="none" />
      <g class="eye"><circle cx="88" cy="74" r="7.48" fill="#3a2a1e" /><circle cx="90.39" cy="71.61" r="2.54" fill="#fff" /></g><g class="eye"><circle cx="112" cy="74" r="7.48" fill="#3a2a1e" /><circle cx="114.39" cy="71.61" r="2.54" fill="#fff" /></g><path d="M80.5 64.5 L92.55 62.5" stroke="#3a2a1e" stroke-width="3" stroke-linecap="round" fill="none" /><path d="M119.5 64.5 L107.45 62.5" stroke="#3a2a1e" stroke-width="3" stroke-linecap="round" fill="none" /><ellipse cx="85.4" cy="84.5" rx="5" ry="3.2" fill="#ff9aa8" opacity="0.8"/><ellipse cx="114.6" cy="84.5" rx="5" ry="3.2" fill="#ff9aa8" opacity="0.8"/><path d="M100 90 Q100 86 100 90 Q100 92 100 90 Z" fill="#7a2230" /><path d="M100 97 Q100 92 100 97 Z" fill="#ff7d93" /><g class="spark" style="animation-delay:0s"><path d="M71.5 55.5 L73.42 59.58 L77.5 61.5 L73.42 63.42 L71.5 67.5 L69.58 63.42 L65.5 61.5 L69.58 59.58 Z" fill="#ffd84d" /></g><g class="spark" style="animation-delay:0.5s"><path d="M130.5 67 L132.1 70.4 L135.5 72 L132.1 73.6 L130.5 77 L128.9 73.6 L125.5 72 L128.9 70.4 Z" fill="#ffd84d" /></g><g class="spark" style="animation-delay:0.9s"><path d="M100 40.5 L101.6 43.9 L105 45.5 L101.6 47.1 L100 50.5 L98.4 47.1 L95 45.5 L98.4 43.9 Z" fill="#ffd84d" /></g>
    </g>
</svg>
