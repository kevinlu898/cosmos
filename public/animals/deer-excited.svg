<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Daisy the deer looking excited">
  <style>
    .bob   { animation: a-bob 3.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .eye   { animation: a-blink 4.6s infinite; transform-box: fill-box; transform-origin: center; }
    .tail  { animation: a-wag 1.5s ease-in-out infinite; }
    .footL { animation: a-step 1.1s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .footR { animation: a-step 1.1s ease-in-out infinite .55s; transform-box: fill-box; transform-origin: center bottom; }
    .ear   { animation: a-ear 3.6s ease-in-out infinite; }
    .spark { animation: a-twinkle 1.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .tear  { animation: a-drop 2.8s ease-in infinite; transform-box: fill-box; transform-origin: center; }

    @keyframes a-bob  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    @keyframes a-blink{ 0%,93%,100% { transform: scaleY(1); } 96.5% { transform: scaleY(0.08); } }
    @keyframes a-wag  { 0%,100% { transform: rotate(-11deg); } 50% { transform: rotate(11deg); } }
    @keyframes a-step { 0%,100% { transform: translateY(0); } 30% { transform: translateY(-6px) rotate(-4deg); } }
    @keyframes a-ear  { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-5deg); } }
    @keyframes a-twinkle { 0%,100% { opacity: .25; transform: scale(.6); } 50% { opacity: 1; transform: scale(1.1); } }
    @keyframes a-drop { 0% { transform: translateY(0); opacity: 0; } 15% { opacity: 1; } 100% { transform: translateY(16px); opacity: 0; } }

    @media (prefers-reduced-motion: reduce) {
      .bob,.eye,.tail,.footL,.footR,.ear,.spark,.tear { animation: none !important; }
    }
  </style>
  <ellipse cx="100" cy="188" rx="56" ry="9" fill="#000" opacity="0.12"/>
  
    <g class="tail" style="transform-box:view-box;transform-origin:118px 138px"><ellipse cx="120" cy="140" rx="7" ry="12" fill="#d9a86c" /><ellipse cx="120" cy="134" rx="5" ry="7" fill="#f0d6b0" /></g>
    <g class="footL"><ellipse cx="82" cy="176" rx="9" ry="12" fill="#c8915a" /><ellipse cx="82" cy="184" rx="8" ry="5" fill="#5a4632" /></g>
    <g class="footR"><ellipse cx="118" cy="176" rx="9" ry="12" fill="#c8915a" /><ellipse cx="118" cy="184" rx="8" ry="5" fill="#5a4632" /></g>
    <g class="bob">
      <ellipse cx="100" cy="138" rx="38" ry="36" fill="#c8915a" />
      <ellipse cx="100" cy="148" rx="24" ry="22" fill="#f0d6b0" />
      <!-- head -->
      <ellipse cx="100" cy="80" rx="30" ry="30" fill="#c8915a" />
      <ellipse cx="100" cy="92" rx="18" ry="16" fill="#f0d6b0" />
      <!-- antlers -->
      <path d="M86 56 L80 34" stroke="#8a6a3a" stroke-width="4" stroke-linecap="round" fill="none" /><path d="M80 40 L72 32" stroke="#8a6a3a" stroke-width="4" stroke-linecap="round" fill="none" /><path d="M80 40 L86 30" stroke="#8a6a3a" stroke-width="4" stroke-linecap="round" fill="none" />
      <path d="M114 56 L120 34" stroke="#8a6a3a" stroke-width="4" stroke-linecap="round" fill="none" /><path d="M120 40 L128 32" stroke="#8a6a3a" stroke-width="4" stroke-linecap="round" fill="none" /><path d="M120 40 L114 30" stroke="#8a6a3a" stroke-width="4" stroke-linecap="round" fill="none" />
      <!-- ears -->
      <g class="ear" style="transform-box:view-box;transform-origin:74px 70px"><ellipse cx="70" cy="66" rx="8" ry="14" fill="#b07d49" /><ellipse cx="70" cy="66" rx="4" ry="9" fill="#f0d6b0" /></g>
      <g class="ear" style="transform-box:view-box;transform-origin:126px 70px;animation-delay:.7s"><ellipse cx="130" cy="66" rx="8" ry="14" fill="#b07d49" /><ellipse cx="130" cy="66" rx="4" ry="9" fill="#f0d6b0" /></g>
      <ellipse cx="100" cy="96" rx="6" ry="4.5" fill="#3a2a1e" />
      <g class="eye"><circle cx="87" cy="80" r="8.05" fill="#3a2a1e" /><circle cx="89.58" cy="77.42" r="2.74" fill="#fff" /></g><g class="eye"><circle cx="113" cy="80" r="8.05" fill="#3a2a1e" /><circle cx="115.58" cy="77.42" r="2.74" fill="#fff" /></g><path d="M79 70 L91.9 68" stroke="#3a2a1e" stroke-width="3" stroke-linecap="round" fill="none" /><path d="M121 70 L108.1 68" stroke="#3a2a1e" stroke-width="3" stroke-linecap="round" fill="none" /><ellipse cx="84.2" cy="91" rx="5" ry="3.2" fill="#ff9aa8" opacity="0.8"/><ellipse cx="115.8" cy="91" rx="5" ry="3.2" fill="#ff9aa8" opacity="0.8"/><path d="M88 96 Q100 92 112 96 Q100 110 88 96 Z" fill="#7a2230" /><path d="M93.4 103 Q100 110 106.6 103 Z" fill="#ff7d93" /><g class="spark" style="animation-delay:0s"><path d="M70 61 L71.92 65.08 L76 67 L71.92 68.92 L70 73 L68.08 68.92 L64 67 L68.08 65.08 Z" fill="#ffd84d" /></g><g class="spark" style="animation-delay:0.5s"><path d="M132 73 L133.6 76.4 L137 78 L133.6 79.6 L132 83 L130.4 79.6 L127 78 L130.4 76.4 Z" fill="#ffd84d" /></g><g class="spark" style="animation-delay:0.9s"><path d="M100 46 L101.6 49.4 L105 51 L101.6 52.6 L100 56 L98.4 52.6 L95 51 L98.4 49.4 Z" fill="#ffd84d" /></g>
    </g>
</svg>
