<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Ellie the elephant looking excited">
  <style>
    .bob   { animation: a-bob 3.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .eye   { animation: a-blink 4.6s infinite; transform-box: fill-box; transform-origin: center; }
    .tail  { animation: a-wag 1.5s ease-in-out infinite; }
    .footL { animation: a-step 1.1s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .footR { animation: a-step 1.1s ease-in-out infinite .55s; transform-box: fill-box; transform-origin: center bottom; }
    .ear   { animation: a-ear 3.6s ease-in-out infinite; }
    .spark { animation: a-twinkle 1.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .tear  { animation: a-drop 2.8s ease-in infinite; transform-box: fill-box; transform-origin: center; }

    @keyframes a-bob  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    @keyframes a-blink{ 0%,93%,100% { transform: scaleY(1); } 96.5% { transform: scaleY(0.08); } }
    @keyframes a-wag  { 0%,100% { transform: rotate(-11deg); } 50% { transform: rotate(11deg); } }
    @keyframes a-step { 0%,100% { transform: translateY(0); } 30% { transform: translateY(-6px) rotate(-4deg); } }
    @keyframes a-ear  { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-5deg); } }
    @keyframes a-twinkle { 0%,100% { opacity: .25; transform: scale(.6); } 50% { opacity: 1; transform: scale(1.1); } }
    @keyframes a-drop { 0% { transform: translateY(0); opacity: 0; } 15% { opacity: 1; } 100% { transform: translateY(16px); opacity: 0; } }

    @media (prefers-reduced-motion: reduce) {
      .bob,.eye,.tail,.footL,.footR,.ear,.spark,.tear { animation: none !important; }
    }
  </style>
  <ellipse cx="100" cy="188" rx="56" ry="9" fill="#000" opacity="0.12"/>
  
    <g class="tail" style="transform-box:view-box;transform-origin:134px 150px"><path d="M134 150 L150 168" stroke="#9fb0bd" stroke-width="4" stroke-linecap="round" fill="none" /><circle cx="151" cy="170" r="4" fill="#5d6b75" /></g>
    <g class="footL"><ellipse cx="84" cy="176" rx="13" ry="13" fill="#9fb0bd" /><ellipse cx="84" cy="184" rx="9" ry="4" fill="#c2cdd6" /></g>
    <g class="footR"><ellipse cx="116" cy="176" rx="13" ry="13" fill="#9fb0bd" /><ellipse cx="116" cy="184" rx="9" ry="4" fill="#c2cdd6" /></g>
    <g class="bob">
      <ellipse cx="100" cy="144" rx="40" ry="38" fill="#9fb0bd" />
      <ellipse cx="100" cy="152" rx="25" ry="22" fill="#c2cdd6" />
      <g class="ear" style="transform-box:view-box;transform-origin:74px 80px"><ellipse cx="64" cy="86" rx="20" ry="26" fill="#8fa1ae" /></g>
      <g class="ear" style="transform-box:view-box;transform-origin:126px 80px;animation-delay:.6s"><ellipse cx="136" cy="86" rx="20" ry="26" fill="#8fa1ae" /></g>
      <ellipse cx="100" cy="80" rx="30" ry="30" fill="#9fb0bd" />
      <!-- trunk -->
      <path d="M92 92 Q88 122 98 134 Q108 138 108 126 Q102 120 104 98 Z" fill="#9fb0bd" />
      <ellipse cx="92" cy="112" rx="6" ry="3" fill="#fff6e0" /><ellipse cx="108" cy="112" rx="6" ry="3" fill="#fff6e0" />
      <g class="eye"><circle cx="87" cy="74" r="8.05" fill="#3a2a1e" /><circle cx="89.58" cy="71.42" r="2.74" fill="#fff" /></g><g class="eye"><circle cx="113" cy="74" r="8.05" fill="#3a2a1e" /><circle cx="115.58" cy="71.42" r="2.74" fill="#fff" /></g><path d="M79 64 L91.9 62" stroke="#3a2a1e" stroke-width="3" stroke-linecap="round" fill="none" /><path d="M121 64 L108.1 62" stroke="#3a2a1e" stroke-width="3" stroke-linecap="round" fill="none" /><ellipse cx="84.2" cy="85" rx="5" ry="3.2" fill="#ff9aa8" opacity="0.8"/><ellipse cx="115.8" cy="85" rx="5" ry="3.2" fill="#ff9aa8" opacity="0.8"/><path d="M100 94 Q100 90 100 94 Q100 96 100 94 Z" fill="#7a2230" /><path d="M100 101 Q100 96 100 101 Z" fill="#ff7d93" /><g class="spark" style="animation-delay:0s"><path d="M70 55 L71.92 59.08 L76 61 L71.92 62.92 L70 67 L68.08 62.92 L64 61 L68.08 59.08 Z" fill="#ffd84d" /></g><g class="spark" style="animation-delay:0.5s"><path d="M132 67 L133.6 70.4 L137 72 L133.6 73.6 L132 77 L130.4 73.6 L127 72 L130.4 70.4 Z" fill="#ffd84d" /></g><g class="spark" style="animation-delay:0.9s"><path d="M100 40 L101.6 43.4 L105 45 L101.6 46.6 L100 50 L98.4 46.6 L95 45 L98.4 43.4 Z" fill="#ffd84d" /></g>
    </g>
</svg>
