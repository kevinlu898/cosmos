<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Freddy the fox looking excited">
  <style>
    .bob   { animation: a-bob 3.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .eye   { animation: a-blink 4.6s infinite; transform-box: fill-box; transform-origin: center; }
    .tail  { animation: a-wag 1.5s ease-in-out infinite; }
    .footL { animation: a-step 1.1s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .footR { animation: a-step 1.1s ease-in-out infinite .55s; transform-box: fill-box; transform-origin: center bottom; }
    .ear   { animation: a-ear 3.6s ease-in-out infinite; }
    .spark { animation: a-twinkle 1.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .tear  { animation: a-drop 2.8s ease-in infinite; transform-box: fill-box; transform-origin: center; }

    @keyframes a-bob  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    @keyframes a-blink{ 0%,93%,100% { transform: scaleY(1); } 96.5% { transform: scaleY(0.08); } }
    @keyframes a-wag  { 0%,100% { transform: rotate(-11deg); } 50% { transform: rotate(11deg); } }
    @keyframes a-step { 0%,100% { transform: translateY(0); } 30% { transform: translateY(-6px) rotate(-4deg); } }
    @keyframes a-ear  { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-5deg); } }
    @keyframes a-twinkle { 0%,100% { opacity: .25; transform: scale(.6); } 50% { opacity: 1; transform: scale(1.1); } }
    @keyframes a-drop { 0% { transform: translateY(0); opacity: 0; } 15% { opacity: 1; } 100% { transform: translateY(16px); opacity: 0; } }

    @media (prefers-reduced-motion: reduce) {
      .bob,.eye,.tail,.footL,.footR,.ear,.spark,.tear { animation: none !important; }
    }
  </style>
  <ellipse cx="100" cy="188" rx="56" ry="9" fill="#000" opacity="0.12"/>
  
    <g class="tail" style="transform-box:view-box;transform-origin:122px 150px"><path d="M120 150 Q170 150 168 110 Q150 120 138 138 Q126 144 120 150 Z" fill="#ef8a3c" /><path d="M168 110 Q176 128 160 134 Q160 122 168 110 Z" fill="#fff3e6" /></g>
    <g class="footL"><ellipse cx="86" cy="178" rx="9" ry="10" fill="#ef8a3c" /><ellipse cx="86" cy="184" rx="7" ry="4" fill="#2b2b2b" /></g>
    <g class="footR"><ellipse cx="114" cy="178" rx="9" ry="10" fill="#ef8a3c" /><ellipse cx="114" cy="184" rx="7" ry="4" fill="#2b2b2b" /></g>
    <g class="bob">
      <ellipse cx="100" cy="144" rx="36" ry="34" fill="#ef8a3c" />
      <path d="M74 150 Q100 138 126 150 Q100 178 74 150 Z" fill="#fff3e6" />
      <!-- head: angular fox face -->
      <path d="M100 50 L132 78 Q138 100 100 108 Q62 100 68 78 Z" fill="#ef8a3c" />
      <path d="M100 84 Q116 92 116 100 Q100 110 84 100 Q84 92 100 84 Z" fill="#fff3e6" />
      <!-- ears -->
      <g class="ear" style="transform-box:view-box;transform-origin:74px 70px"><path d="M62 78 L60 40 L88 64 Z" fill="#ef8a3c" /><path d="M64 70 L64 50 L80 64 Z" fill="#2b2b2b" /></g>
      <g class="ear" style="transform-box:view-box;transform-origin:126px 70px;animation-delay:.7s"><path d="M138 78 L140 40 L112 64 Z" fill="#ef8a3c" /><path d="M136 70 L136 50 L120 64 Z" fill="#2b2b2b" /></g>
      <circle cx="100" cy="99" r="5" fill="#2b2b2b" />
      <g class="eye"><circle cx="87" cy="74" r="8.05" fill="#3a2a1e" /><circle cx="89.58" cy="71.42" r="2.74" fill="#fff" /></g><g class="eye"><circle cx="113" cy="74" r="8.05" fill="#3a2a1e" /><circle cx="115.58" cy="71.42" r="2.74" fill="#fff" /></g><path d="M79 64 L91.9 62" stroke="#3a2a1e" stroke-width="3" stroke-linecap="round" fill="none" /><path d="M121 64 L108.1 62" stroke="#3a2a1e" stroke-width="3" stroke-linecap="round" fill="none" /><ellipse cx="84.2" cy="85" rx="5" ry="3.2" fill="#ff9aa8" opacity="0.8"/><ellipse cx="115.8" cy="85" rx="5" ry="3.2" fill="#ff9aa8" opacity="0.8"/><path d="M89 93 Q100 89 111 93 Q100 106 89 93 Z" fill="#7a2230" /><path d="M93.95 100 Q100 106 106.05 100 Z" fill="#ff7d93" /><g class="spark" style="animation-delay:0s"><path d="M70 55 L71.92 59.08 L76 61 L71.92 62.92 L70 67 L68.08 62.92 L64 61 L68.08 59.08 Z" fill="#ffd84d" /></g><g class="spark" style="animation-delay:0.5s"><path d="M132 67 L133.6 70.4 L137 72 L133.6 73.6 L132 77 L130.4 73.6 L127 72 L130.4 70.4 Z" fill="#ffd84d" /></g><g class="spark" style="animation-delay:0.9s"><path d="M100 40 L101.6 43.4 L105 45 L101.6 46.6 L100 50 L98.4 46.6 L95 45 L98.4 43.4 Z" fill="#ffd84d" /></g>
    </g>
</svg>
